<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitaciones al Click</title>
    <style>
        html{
             scroll-behavior: smooth;
        }
        body {
            margin: 0;
            padding: 0;
         
     
            
          overflow-y: scroll;
    scroll-snap-type: y mandatory;
         
            font-family:  sans-serif;
            
        }
        .snap{
               height: 90vh;
scroll-snap-align: center;
    scroll-snap-stop: always;
        }
.screen{
      width: 100vw;
       
      background: #353644; 
    display: flex;
            justify-content: center;
            align-items: center;
    color:#efefef;
    
}
        
.splash {
            display: flex;
            justify-content: center;
            align-items: center;
            background: #242533; 
width: 100vw;
 
   
        }

        

        h1.title {
            font-size: 56px;
            color: #efefef;
            font-weight: 200;
            text-align: center;
            line-height:60px;
            
        }
        header{
            top:0;
            left:0;
            right:0;
            position:fixed;
            z-index:1000;
            color:#cccccc;
            
        }
        nav.social {
            position:absolute;
            right:32px;
            top:32px;
        }
        nav.social a{
color:white;
            text-decoration:none;
            font-size:32px;
        }
    </style>
</head>
<body>
    <header><nav class='social'><a href='https://www.instagram.com/invitaciones.alclick'>IG</a></header>
    <div class='splash snap'>
    <h1 class='title'>Invitaciones <br>al Click</h1>
    </div>
  
    <div class='screen snap'>
      <div>
    <p>opciones...</p>
      </div>
       </div>

    <div class='screen snap'>
      <div>
    <p>más opciones...</p>
      </div>
       </div>

    
    <script>
    function startTitleBlink() {
    const title = document.querySelector("h1.title");
    if (!title) return;

    title.style.transition = "color 0.9s ease-in-out";

    let toggle = false;

    setInterval(() => {
        toggle = !toggle;
        title.style.color = toggle ? "#ccccff" : "#ffcccc";
    }, 1900);
}

// Start the animation
startTitleBlink();
        </script>
</body>
</html>
