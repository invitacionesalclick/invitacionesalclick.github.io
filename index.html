<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitaciones al Click</title>
    <style>
        html{
             scroll-behavior: smooth;
        }
        body {
            margin: 0;
            padding: 0;
         
            background: #242533; 
            
          overflow-y: scroll;
    scroll-snap-type: y mandatory;
         
            font-family:  sans-serif;
            
        }
        .snap{
               height: 75vh;
scroll-snap-align: center;
    scroll-snap-stop: always;
        }
.screen{
      width: 100vw;
       
      background: #353644; 
    display: flex;
            justify-content: center;
            align-items: center;
    color:#efefef;
    
}
        
.splash {
            display: flex;
            justify-content: center;
            align-items: center;
           
width: 100vw;
 height:90vh !important;
   
        }

        

        h1.title {
            font-size: 56px;
            color: #efefef;
            font-weight: 200;
            text-align: center;
            line-height:60px;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.45);
            text-shadow:
    0 2px 4px rgba(0, 0, 0, 0.40),
    0 6px 16px rgba(0, 0, 0, 0.28);
        }
        header{
            top:0;
            left:0;
            right:0;
            position:fixed;
            z-index:1000;
            color:#cccccc;
            
        }
        nav.social {
            position:absolute;
            right:32px;
            top:32px;
        }
        nav.social a{
color:white;
            text-decoration:none;
          
        }
        nav.social a img{
            width:20px;
            height:auto;
            opacity:0.7;
            transition:opacity 0.5s ease-in-out;
        }

        nav.social a:hover img{
        
            opacity:1;
            transition:opacity 0.5s ease-in-out;
        }

        .splash .bgimage{
            position:absolute;
            top:0;
            left:0;
            right: 0;
            bottom: 0;
            width:100%;
            height:100%;
            z-index: -1;
            overflow: hidden;
        }
        .splash .bgimage img{
            object-fit: cover;
            width: 100%;
            height: 100%;
        }
        .linkLabel{

            vertical-align: middle;
        }
        .linkLabel > *{
            vertical-align: middle;
            
        }
        .tag{
            margin:1 16px 1px 0px;
            padding:4px 12px;
            background-color: #ffffff;
            color:#111111;
            font-size: 12px;
            border-radius: 4px;
            opacity: 0;
            transition: opacity 0.4s ease-in-out;
        }
        .tag.pleno{
        opacity: 1;
        transition: opacity 0.4s ease-in-out;
            
        }
        .box{
            overflow: hidden;
            margin: 0px 16px 16px 0px;
            border:1px solid #eeeeee44;
            padding:12px 24px;
            border-radius: 6px;
            display:inline-block;
         
        }
.box img{
object-fit: cover;
width:100%;

}
</style>
</head>
<body>
    <header>
        <nav class='social'>
            <a class='linkLabel' name='instagram' target='_blank' alt='visitanos en Instagram' href='https://www.instagram.com/invitaciones.alclick'>
                <img src='img/instagram.svg'>
            </a></nav>
        </header>
    <div class='splash snap'>
        <div class='bgimage'><img src='fotos/fotoMain1.jpg'></div>
        <div >
    <h1 class='title'>Invitaciones <br>al Click</h1>
    </div>
    </div>
  
    <div class='screen snap'>
      <div>
    <div>
    
        <figure class='box'>
            <figcaption> BOOKS<br>bodas / 15 años / Baby shower 
             </figcaption>
        </figure>
    
        <figure class='box'>
        <figcaption> INVITACIONES<br>digitales / interactivas
                </figcaption>
    </figure>

    <figure class='box'>
        <figcaption> FOTOGRAFÍA
                </figcaption>
    </figure>
    </div>
      </div>
       </div>

    <div class='screen snap' style=' background: #242533;'>
      <div>
    <p>Más opciones...?</p>
      </div>
       </div>

    



    <script  type="text/javascript">


    function startTitleBlink() {
    const title = document.querySelector("h1.title");
    if (!title) return;
let ms=1000;
    title.style.transition = `color ${ms}ms ease-in-out`;

    let toggle = false;

    setInterval(() => {
        toggle = !toggle;
        title.style.color = toggle ? "#ffffff" : "#cccccc";
    }, ms);
}
//startTitleBlink();


linkLabels()


function linkLabels(){
    [...document.querySelectorAll('.linkLabel')].forEach(linkLabel);
    function linkLabel(cont){
        let tag=document.createElement('div');
        tag.classList.add('tag');
cont.prepend(tag);
        let label=cont.getAttribute('name');
        tag.innerHTML=label;
        tag.style.display='none';
        console.log(label);
     let icon=   cont.querySelector('img');
     icon.addEventListener('mouseover',mo);


function mo(e){
    icon.removeEventListener('mouseover',mo);
    tag.style.display='inline-block';
    setTimeout(()=>{
        tag.classList.add('pleno');
    },400);

    setTimeout(()=>{
        tag.classList.remove('pleno');
        setTimeout(()=>{
        tag.style.display='none';
        icon.addEventListener('mouseover',mo);
        },1000);
    },2000);

}


    }





}
        </script>
</body>
</html>
