<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitaciones al Click</title>
    <style>
        * {
            margin: 0;
            padding: 0;
         
     
            
         
         
            font-family:  sans-serif;
            
        }
.splash {
            display: flex;
            justify-content: center;
            align-items: center;
            background: #363344; 
    width: 100vw;
            height: 100vh;
            
        }

        

        h1.title {
            font-size: 74px;
            color: #efefef;
            font-weight: 200;
            text-align: center;
            line-height:60px;
            
        }
    </style>
</head>
<body>
    <h1 class='title'>Invitaciones <br>al Click</h1>
    <script>
    function startTitleBlink() {
    const title = document.querySelector("h1.title");
    if (!title) return;

    title.style.transition = "color 0.9s ease-in-out";

    let toggle = false;

    setInterval(() => {
        toggle = !toggle;
        title.style.color = toggle ? "#ddddff" : "#efefef";
    }, 900);
}

// Start the animation
startTitleBlink();
        </script>
</body>
</html>
